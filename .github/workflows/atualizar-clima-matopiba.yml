name: Atualizar Clima Regional Open-Meteo

on:
  schedule:
    # Camada 1: tentativa automática pelo próprio GitHub.
    # Roda no minuto 17 de cada hora em UTC.
    - cron: "17 * * * *"

  workflow_dispatch:

  repository_dispatch:
    types:
      - atualizar_clima_horario

permissions:
  contents: write

concurrency:
  group: atualizar-clima-openmeteo
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Mostrar evento da execução
        run: |
          echo "Evento que disparou o workflow: ${{ github.event_name }}"
          echo "Data UTC:"
          date -u

      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verificar arquivos antes da coleta
        run: |
          echo "Branch atual:"
          git branch --show-current

          echo "Arquivos da raiz:"
          ls -la

          echo "Arquivos do clima:"
          ls -la public/clima/regional || true

      - name: Gerar dados reais de previsão Open-Meteo
        run: |
          python coletor_openmeteo_matopiba.py

      - name: Conferir JSON gerado
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("public/clima/regional/openmeteo_regional.json")

          if not path.exists():
              raise SystemExit("ERRO: openmeteo_regional.json não foi encontrado.")

          data = json.loads(path.read_text(encoding="utf-8"))

          print("ok:", data.get("ok"))
          print("fonte:", data.get("fonte"))
          print("area:", data.get("area"))
          print("gerado_em_utc:", data.get("gerado_em_utc"))
          print("total_pontos:", data.get("total_pontos"))
          print("malha:", data.get("malha", {}))
          print("total_erros:", data.get("total_erros"))
          PY

      - name: Commitar dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/clima/regional/openmeteo_regional.json
          git add public/clima/regional/openmeteo_regional_ultimo_valido.json

          if git diff --cached --quiet; then
            echo "Sem alterações para commit."
            echo "O coletor rodou, mas o JSON final ficou igual ao anterior."
            exit 0
          fi

          git commit -m "Atualiza previsão regional Open-Meteo"
          git push
