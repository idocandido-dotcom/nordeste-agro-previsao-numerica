name: Atualizar Clima Regional Open-Meteo

on:
  schedule:
    # Roda de hora em hora no minuto 23.
    # O GitHub Actions usa horário UTC.
    - cron: "23 * * * *"

  # Permite rodar manualmente pelo botão "Run workflow"
  # e também pelo cron-job.org usando workflow_dispatch.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Criar pastas necessárias
        run: |
          mkdir -p public/clima/regional

      - name: Rodar coletor Open-Meteo Regional
        run: |
          python coletor_openmeteo_matopiba.py

      - name: Verificar arquivo gerado
        run: |
          echo "Verificando arquivo gerado..."
          ls -lah public/clima/regional/
          test -f public/clima/regional/openmeteo_regional.json

      - name: Commit e push dos dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/clima/regional/openmeteo_regional.json

          if git diff --cached --quiet; then
            echo "Nenhuma alteração nos dados climáticos."
          else
            git commit -m "Atualizar clima regional Open-Meteo"
            git push
          fi
