name: Atualizar Clima Regional Open-Meteo

on:
  schedule:
    # Roda todos os dias às 06:35 no horário de Brasília
    # 09:35 UTC = 06:35 BRT
    - cron: "35 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gerar dados reais de previsão Open-Meteo
        run: |
          python coletor_openmeteo_matopiba.py

      - name: Commitar dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/clima/regional

          if git diff --cached --quiet; then
            echo "Sem alterações para commit."
            exit 0
          fi

          git commit -m "Atualiza previsão regional Open-Meteo"
          git push
