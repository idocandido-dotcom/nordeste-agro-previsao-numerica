name: Atualizar Clima MATOPIBA INMET

on:
  schedule:
    - cron: "35 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install playwright pillow
          python -m playwright install --with-deps chromium

      - name: Baixar ZIP oficial do VIME e gerar imagens MATOPIBA
        run: |
          xvfb-run -a python capturar_vime_matopiba.py

      - name: Commitar imagens atualizadas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/clima/matopiba

          if git diff --cached --quiet; then
            echo "Sem alterações para commit."
            exit 0
          fi

          git commit -m "Atualiza clima MATOPIBA INMET"
          git push
