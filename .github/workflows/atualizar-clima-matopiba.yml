name: Atualizar Clima Regional Open-Meteo

on:
  schedule:
    # Roda de hora em hora.
    # O GitHub usa horário UTC.
    # Exemplo: 00:35, 01:35, 02:35... UTC
    - cron: "35 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Verificar arquivos antes da coleta
        run: |
          echo "Arquivos na raiz do repositório:"
          ls -la

          echo ""
          echo "Arquivos em public/clima/regional:"
          mkdir -p public/clima/regional
          ls -la public/clima/regional || true

      - name: Gerar dados reais de previsão Open-Meteo
        run: |
          python coletor_openmeteo_matopiba.py

      - name: Conferir JSON gerado
        run: |
          echo "Conferindo arquivo gerado..."

          if [ ! -f public/clima/regional/openmeteo_regional.json ]; then
            echo "ERRO: arquivo public/clima/regional/openmeteo_regional.json não foi gerado."
            exit 1
          fi

          echo "Arquivo encontrado:"
          ls -lh public/clima/regional/openmeteo_regional.json

          echo ""
          echo "Primeiras linhas do JSON:"
          head -n 40 public/clima/regional/openmeteo_regional.json

      - name: Commitar dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="${GITHUB_REF_NAME:-main}"

          echo "Sincronizando com a branch remota antes do commit..."
          git pull --rebase --autostash origin "$BRANCH"

          echo "Verificando alterações geradas..."
          git status --short

          git add public/clima/regional/openmeteo_regional.json

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para commitar."
            exit 0
          fi

          git commit -m "Atualiza previsão regional Open-Meteo"

          echo "Enviando atualização para a branch $BRANCH..."
          git push origin "HEAD:$BRANCH"
