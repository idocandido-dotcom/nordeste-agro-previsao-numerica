name: Atualizar Cotações Nordeste Agro

on:
  schedule:
    # Atualiza todos os dias às 07:20 no horário de Brasília
    # 10:20 UTC = 07:20 BRT
    - cron: "20 10 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gerar JSON de cotações
        run: |
          python coletor_cotacoes_regionais.py

      - name: Commitar cotações atualizadas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/cotacoes/cotacoes_regionais.json
          git add public/cotacoes/cotacoes_regionais_ultimo_valido.json

          if git diff --cached --quiet; then
            echo "Sem alterações para commit."
            exit 0
          fi

          git commit -m "Atualiza cotações regionais"
          git push
